<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Елена Десятова — Вайбкодер</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0d0907;
      --card:  #130f0b;
      --o1:    #a84d18;
      --o2:    #bf7340;
      --o3:    #7a300d;
      --text:  #ede0d4;
      --muted: #7a6a5c;
      --border: rgba(255,255,255,0.05);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Фоновые градиенты */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(168,77,24,.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(122,48,13,.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 60% 40%, rgba(191,115,64,.03) 0%, transparent 55%);
    }

    /* Частицы */
    .particles { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .particle  {
      position: absolute; border-radius: 50%; opacity: 0;
      animation: floatUp var(--dur,8s) ease-in-out var(--delay,0s) infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.55; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(var(--drift,20px)); opacity: 0; }
    }

    /* Обёртка для градиентной рамки */
    .card-outer {
      position: relative; z-index: 1;
      border-radius: 29px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(168,77,24,.3), rgba(191,115,64,.12), rgba(122,48,13,.22));
      box-shadow:
        0 32px 80px rgba(0,0,0,0.65),
        0 0 60px rgba(168,77,24,.05);
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
      width: calc(100% - 32px);
      max-width: 480px;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Карточка */
    .card {
      position: relative;
      background: var(--card);
      border-radius: 28px;
      padding: 62px 48px 48px;
      text-align: center;
      overflow: hidden;
    }

    /* Аватар */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 28px;
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--o1), var(--o2), #f5c49e, var(--o1));
      animation: spin 4s linear infinite;
      z-index: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-ring::after {
      content: '';
      position: absolute; inset: 3px;
      border-radius: 50%;
      background: var(--card);
    }

    .avatar {
      position: relative; z-index: 1;
      width: 173px; height: 173px;
      border-radius: 50%;
      background: linear-gradient(135deg, #221508 0%, #1a0f07 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
      user-select: none;
      overflow: hidden;
      cursor: pointer;
    }

    .avatar img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      border-radius: 50%;
      display: block;
    }

    .avatar .avatar-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
    }

    /* Имя */
    .name {
      font-size: clamp(28px, 6vw, 36px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      background: linear-gradient(120deg, #fde8d8 0%, var(--o2) 38%, var(--o1) 68%, var(--o3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: nameGlow 3s ease-in-out infinite alternate;
    }
    @keyframes nameGlow {
      from { filter: drop-shadow(0 0 4px rgba(168,77,24,.15)); }
      to   { filter: drop-shadow(0 0 12px rgba(168,77,24,.32)) drop-shadow(0 0 24px rgba(191,115,64,.1)); }
    }

    /* Бейдж специализации */
    .role {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px;
      padding: 6px 16px;
      background: rgba(232,97,26,.1);
      border: 1px solid rgba(232,97,26,.28);
      border-radius: 100px;
      font-size: 13px; font-weight: 500;
      color: var(--o2);
      letter-spacing: 0.5px;
    }
    .role-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--o1);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.45; transform:scale(.65); }
    }

    /* Разделитель */
    .divider {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, var(--o3), var(--o2));
      border-radius: 2px;
      margin: 28px auto;
      opacity: 0.5;
    }

    /* Соцсети */
    .socials {
      display: flex; justify-content: center;
      gap: 16px; margin-bottom: 32px;
    }

    .social-link {
      display: flex; align-items: center; justify-content: center;
      width: 52px; height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: var(--muted);
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      position: relative; overflow: hidden;
    }

    .social-link::before {
      content: ''; position: absolute; inset: 0;
      border-radius: inherit; opacity: 0;
      transition: opacity 0.25s ease;
    }
    .social-link.tg::before { background: linear-gradient(135deg,#0088cc18,#0088cc38); }
    .social-link.gh::before { background: linear-gradient(135deg,#ffffff0d,#ffffff1a); }
    .social-link.tw::before { background: linear-gradient(135deg,#1d9bf018,#1d9bf038); }

    .social-link svg { position: relative; z-index: 1; transition: transform 0.25s ease, color 0.25s ease; }

    .social-link:hover {
      border-color: rgba(232,97,26,.32);
      transform: translateY(-4px) scale(1.08);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }
    .social-link:hover::before { opacity: 1; }
    .social-link.tg:hover { color: #38bdf8; box-shadow: 0 12px 32px rgba(0,136,204,.2); }
    .social-link.gh:hover { color: #fdf6ef; box-shadow: 0 12px 32px rgba(255,255,255,.07); }
    .social-link.tw:hover { color: #60a5fa; box-shadow: 0 12px 32px rgba(29,155,240,.18); }
    .social-link:hover svg { transform: scale(1.1); }

    /* Тултип */
    .social-link[data-tip]::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 10px); left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #1a1108;
      border: 1px solid rgba(232,97,26,.2);
      color: #fde8d8; font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 8px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity .2s ease, transform .2s ease; z-index: 10;
    }
    .social-link[data-tip]:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Кнопка */
    .cta {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px 28px;
      border-radius: 16px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 600; letter-spacing: .2px;
      color: #fff; text-decoration: none;
      background: linear-gradient(130deg, var(--o1) 0%, var(--o2) 60%, #f5a85a 100%);
      position: relative; overflow: hidden;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
      box-shadow: 0 4px 20px rgba(168,77,24,.22);
    }
    .cta::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg,rgba(255,255,255,.15),transparent);
      opacity: 0; transition: opacity .2s ease;
    }
    .cta:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px rgba(168,77,24,.32), 0 0 0 1px rgba(255,255,255,.06);
    }
    .cta:hover::before { opacity: 1; }
    .cta:active { transform: translateY(0) scale(.99); box-shadow: 0 2px 12px rgba(232,97,26,.3); }

    /* Ripple */
    .ripple {
      position: absolute; width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,.4); transform: scale(0); pointer-events: none;
    }
    .ripple.go { animation: rippleAnim .6s ease-out forwards; }
    @keyframes rippleAnim { to { transform: scale(60); opacity: 0; } }

    /* Подпись */
    .handle {
      margin-top: 14px; font-size: 12px;
      color: var(--muted); letter-spacing: .3px;
    }
    .handle b { color: rgba(232,97,26,.75); font-weight: 500; }

    /* Футер */
    .card-footer {
      margin-top: 32px; padding-top: 24px;
      border-top: 1px solid rgba(232,97,26,.08);
      font-size: 11px; color: #3d2818;
      letter-spacing: .5px; text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px 36px; border-radius: 20px; }
      .avatar { width: 144px; height: 144px; }
    }
  </style>
</head>

  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) setPhoto(URL.createObjectURL(file));
  });

  // --- Ripple ---
  const btn    = document.getElementById('ctaBtn');
  const ripple = document.getElementById('ripple');
  btn.addEventListener('click', (e) => {
    const r = btn.getBoundingClientRect();
    ripple.style.left = (e.clientX - r.left - 4) + 'px';
    ripple.style.top  = (e.clientY - r.top  - 4) + 'px';
    ripple.classList.remove('go');
    void ripple.offsetWidth;
    ripple.classList.add('go');
  });

  // --- Частицы ---
  const wrap   = document.getElementById('particles');
  const colors = ['#7a3810','#a85020','#5c2a0a','#c48060','#8a4820'];
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 1 + Math.random() * 2.4;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dur:${7 + Math.random()*9}s;
      --delay:${-Math.random()*12}s;
      --drift:${(Math.random()-.5)*90}px;
    `;
    wrap.appendChild(p);
  }
</script>

</body>
</html>
